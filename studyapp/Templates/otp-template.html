<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OTP Verification</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #f4f6fb;
    font-family: Arial, Helvetica, sans-serif;
  }

  .email-wrapper {
    width: 100%;
    padding: 40px 0;
  }

  .email-container {
    max-width: 500px;
    background: #ffffff;
    margin: auto;
    border-radius: 8px;
    padding: 30px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    text-align: center;
  }

  .logo {
    font-size: 24px;
    font-weight: bold;
    color: #4a6cf7;
    margin-bottom: 10px;
  }

  h2 {
    margin: 10px 0;
    color: #333;
  }

  p {
    color: #555;
    font-size: 15px;
    line-height: 1.6;
  }

  .otp-box {
    background: #f2f5ff;
    border: 2px dashed #4a6cf7;
    font-size: 32px;
    letter-spacing: 6px;
    font-weight: bold;
    padding: 15px 0;
    margin: 25px 0;
    color: #4a6cf7;
    border-radius: 6px;
  }

  .note {
    font-size: 13px;
    color: #888;
    margin-top: 20px;
  }

  .footer {
    margin-top: 30px;
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>

<body>

<div class="email-wrapper">
  <div class="email-container">

    <div class="logo">HireMint</div>

    <h2>Email Verification</h2>

    <p>
      Use the following One-Time Password (OTP) to verify your email address.
    </p>

    <div class="otp-box">
        {{OTP}}
    </div>

    <p>
      This OTP is valid for <b>15 minutes</b>. Do not share this code with anyone.
    </p>

    <div class="note">
      If you did not request this code, please ignore this email.
    </div>

    <div class="footer">
        © 2026 HireMint.in | All rights reserved.
    </div>

  </div>
</div>

</body>
</html>
